<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiLo Concierge — Private Beta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #2C4A3E;
            --green-light: #3A6355;
            --green-dark: #1E342B;
            --gold: #C9A96E;
            --gold-light: #D4BA88;
            --cream: #FAF8F5;
            --cream-dark: #F2EDE6;
            --white: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-light: #9A9A9A;
            --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            background: var(--cream);
            display: flex;
            flex-direction: column;
        }

        /* ── Header ──────────────────────────────── */

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(44, 74, 62, 0.08);
            background: var(--white);
            flex-shrink: 0;
        }

        .chat-header-logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.04em;
        }

        .chat-header-label {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--gold);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .chat-header-back {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .chat-header-back:hover {
            color: var(--green);
        }

        /* ── Chat area ───────────────────────────── */

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chat-body::-webkit-scrollbar {
            width: 4px;
        }

        .chat-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-body::-webkit-scrollbar-thumb {
            background: rgba(44, 74, 62, 0.15);
            border-radius: 2px;
        }

        .message {
            max-width: 560px;
            animation: messageIn 0.4s var(--ease-out);
        }

        .message-assistant {
            align-self: flex-start;
        }

        .message-user {
            align-self: flex-end;
        }

        .message-sender {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 0.375rem;
            padding-left: 0.125rem;
        }

        .message-assistant .message-sender {
            color: var(--gold);
        }

        .message-user .message-sender {
            color: var(--text-light);
            text-align: right;
            padding-right: 0.125rem;
            padding-left: 0;
        }

        .message-bubble {
            padding: 1rem 1.375rem;
            border-radius: 16px;
            font-size: 0.9375rem;
            line-height: 1.65;
            font-weight: 400;
        }

        .message-assistant .message-bubble {
            background: var(--white);
            color: var(--text-primary);
            border: 1px solid rgba(44, 74, 62, 0.06);
            border-bottom-left-radius: 4px;
        }

        .message-user .message-bubble {
            background: var(--green);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        /* ── Typing indicator ────────────────────── */

        .typing-indicator {
            align-self: flex-start;
            animation: messageIn 0.4s var(--ease-out);
        }

        .typing-indicator .message-sender {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 0.375rem;
            padding-left: 0.125rem;
        }

        .typing-dots {
            display: flex;
            gap: 0.375rem;
            padding: 1rem 1.375rem;
            background: var(--white);
            border: 1px solid rgba(44, 74, 62, 0.06);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            width: fit-content;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-light);
            animation: typingPulse 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-3px); }
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ── Input area ──────────────────────────── */

        .chat-input-area {
            padding: 1.25rem 2rem 1.5rem;
            border-top: 1px solid rgba(44, 74, 62, 0.08);
            background: var(--white);
            flex-shrink: 0;
        }

        .chat-input-form {
            display: flex;
            gap: 0.75rem;
            max-width: 680px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 1.5px solid rgba(44, 74, 62, 0.12);
            border-radius: 100px;
            background: var(--cream);
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            font-weight: 400;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s ease;
        }

        .chat-input::placeholder {
            color: var(--text-light);
        }

        .chat-input:focus {
            border-color: var(--green-light);
        }

        .chat-send {
            padding: 0.875rem 1.75rem;
            background: var(--green);
            color: var(--white);
            border: none;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .chat-send:hover {
            background: var(--green-dark);
        }

        .chat-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ── API Key Modal ───────────────────────── */

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(30, 52, 43, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 1.5rem;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal-card {
            background: var(--cream);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.15);
        }

        .modal-logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2rem;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.04em;
            margin-bottom: 1.5rem;
        }

        .modal-text {
            font-size: 0.9375rem;
            color: var(--text-secondary);
            font-weight: 400;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .modal-input {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border: 1.5px solid rgba(44, 74, 62, 0.15);
            border-radius: 12px;
            background: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            color: var(--text-primary);
            outline: none;
            margin-bottom: 1.25rem;
            transition: border-color 0.15s ease;
        }

        .modal-input:focus {
            border-color: var(--green);
        }

        .modal-input::placeholder {
            color: var(--text-light);
        }

        .modal-submit {
            width: 100%;
            padding: 0.875rem;
            background: var(--green);
            color: var(--white);
            border: none;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .modal-submit:hover {
            background: var(--green-dark);
        }

        .modal-error {
            font-size: 0.8125rem;
            color: #c0392b;
            margin-top: 0.75rem;
            display: none;
        }

        /* ── Mobile ──────────────────────────────── */

        @media (max-width: 640px) {
            .chat-header {
                padding: 0.875rem 1.25rem;
            }

            .chat-header-label {
                display: none;
            }

            .chat-body {
                padding: 1.5rem 1.25rem;
            }

            .chat-input-area {
                padding: 1rem 1.25rem 1.25rem;
            }

            .message {
                max-width: 90%;
            }

            .modal-card {
                padding: 2.5rem 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- API Key Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal-card">
            <div class="modal-logo">LiLo</div>
            <p class="modal-text">Enter your API key to access the concierge demo</p>
            <form id="modal-form">
                <input type="password" class="modal-input" id="api-key-input" placeholder="sk-ant-..." autocomplete="off" required>
                <button type="submit" class="modal-submit">Continue</button>
                <p class="modal-error" id="modal-error">Please enter a valid API key</p>
            </form>
        </div>
    </div>

    <!-- Header -->
    <header class="chat-header" style="position: relative;">
        <div class="chat-header-logo">LiLo</div>
        <div class="chat-header-label">Concierge — Private Beta</div>
        <a href="/" class="chat-header-back">Back</a>
    </header>

    <!-- Chat -->
    <div class="chat-body" id="chat-body">
        <div class="message message-assistant">
            <div class="message-sender">LiLo</div>
            <div class="message-bubble">Welcome. I'm here to help you find the right wellness experience. Tell me what you're looking for — a retreat, an urban escape, a practitioner — and I'll find your match.</div>
        </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
        <form class="chat-input-form" id="chat-form">
            <input type="text" class="chat-input" id="chat-input" placeholder="Tell LiLo what you're looking for..." autocomplete="off" disabled>
            <button type="submit" class="chat-send" id="chat-send" disabled>Send</button>
        </form>
    </div>

    <script>
        // ── State ──────────────────────────────────
        let apiKey = null;
        const messages = [
            {
                role: 'assistant',
                content: "Welcome. I'm here to help you find the right wellness experience. Tell me what you're looking for \u2014 a retreat, an urban escape, a practitioner \u2014 and I'll find your match."
            }
        ];

        const SYSTEM_PROMPT = `You are LiLo's personal wellness concierge \u2014 warm, knowledgeable, and deeply familiar with the world's best wellness experiences. You have curated the following venues and know them personally:

- SHA Wellness Clinic (Alicante, Spain): Medical-led longevity and detox retreats. Exceptional for complete resets. From \u00a34,000/week.
- Six Senses Ibiza (Spain): Yoga, sleep programmes, biohacking. Perfect for combining wellness with luxury. From \u00a31,500/night.
- Lanserhof Tegernsee (Bavaria, Germany): The gold standard for serious medical detox and gut health. Intense but transformative. From \u00a35,000/week.
- Bamford Wellness Spa (Cotswolds, UK): Quintessentially British, deeply restorative. Organic, grounded, beautiful. From \u00a3400/day.
- Vivamayr (Austria): Medical fasting and gut health. Clinical but life-changing. Popular with CEOs and athletes. From \u00a34,500/week.
- BodySpace (London, UK): Urban private gym with elite personal trainers. Members only. Best for London-based high performance.
- Remedy Place (London, UK): Premium urban wellness club \u2014 ice baths, IV drips, infrared saunas, breathwork. Walk-in and membership.
- Othership (multiple locations): Community sauna and cold plunge with breathwork. Social, energising, transformative. From \u00a330/session.

When a user asks you something, ask one or two short clarifying questions if needed, then recommend the most suitable option. Be warm, specific, and concise. Write like a knowledgeable friend, not a brochure. Never use bullet points. Never mention Claude or that you are an AI \u2014 you are LiLo's concierge.`;

        // ── DOM refs ───────────────────────────────
        const modal = document.getElementById('modal');
        const modalForm = document.getElementById('modal-form');
        const apiKeyInput = document.getElementById('api-key-input');
        const modalError = document.getElementById('modal-error');
        const chatBody = document.getElementById('chat-body');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');

        // ── Modal ──────────────────────────────────
        modalForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const key = apiKeyInput.value.trim();
            if (!key) {
                modalError.style.display = 'block';
                return;
            }
            apiKey = key;
            modal.classList.add('hidden');
            chatInput.disabled = false;
            chatSend.disabled = false;
            chatInput.focus();
        });

        // ── Chat ───────────────────────────────────
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text || !apiKey) return;

            // Add user message
            appendMessage('user', text);
            messages.push({ role: 'user', content: text });
            chatInput.value = '';
            chatSend.disabled = true;
            chatInput.disabled = true;

            // Show typing indicator
            const typing = showTyping();

            try {
                const res = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-allow-browser': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-5-20241022',
                        max_tokens: 1024,
                        system: SYSTEM_PROMPT,
                        messages: messages.filter(m => m.role !== 'system')
                    })
                });

                removeTyping(typing);

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error?.message || `API error ${res.status}`);
                }

                const data = await res.json();
                const reply = data.content[0].text;
                appendMessage('assistant', reply);
                messages.push({ role: 'assistant', content: reply });

            } catch (err) {
                removeTyping(typing);
                appendMessage('assistant', `Something went wrong: ${err.message}. Please check your API key and try again.`);
            }

            chatInput.disabled = false;
            chatSend.disabled = false;
            chatInput.focus();
        });

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message message-${role}`;

            const sender = document.createElement('div');
            sender.className = 'message-sender';
            sender.textContent = role === 'assistant' ? 'LiLo' : 'You';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;

            wrapper.appendChild(sender);
            wrapper.appendChild(bubble);
            chatBody.appendChild(wrapper);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function showTyping() {
            const el = document.createElement('div');
            el.className = 'typing-indicator';
            el.innerHTML = `
                <div class="message-sender">LiLo</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>`;
            chatBody.appendChild(el);
            chatBody.scrollTop = chatBody.scrollHeight;
            return el;
        }

        function removeTyping(el) {
            if (el && el.parentNode) el.parentNode.removeChild(el);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiLo Concierge — Private Beta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        :root {
            --green: #2C4A3E;
            --green-light: #3A6355;
            --green-dark: #1E342B;
            --gold: #C9A96E;
            --gold-light: #D4BA88;
            --cream: #FAF8F5;
            --cream-dark: #F2EDE6;
            --white: #FFFFFF;
            --text-primary: #1A1A1A;
            --text-secondary: #6B6B6B;
            --text-light: #9A9A9A;
            --ease-out: cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-primary);
            background: var(--cream);
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(44, 74, 62, 0.08);
            background: var(--white);
            flex-shrink: 0;
            position: relative;
        }

        .chat-header-logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--green);
            letter-spacing: 0.04em;
        }

        .chat-header-label {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--gold);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .chat-header-back {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.15s ease;
        }

        .chat-header-back:hover { color: var(--green); }

        .chat-body {
            flex: 1;
            min-height: calc(100vh - 180px);
            overflow-y: auto;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .chat-body::-webkit-scrollbar { width: 4px; }
        .chat-body::-webkit-scrollbar-track { background: transparent; }
        .chat-body::-webkit-scrollbar-thumb { background: rgba(44, 74, 62, 0.15); border-radius: 2px; }

        .message {
            max-width: 560px;
            animation: messageIn 0.4s var(--ease-out);
        }

        .message-assistant { align-self: flex-start; }
        .message-user { align-self: flex-end; }

        .message-sender {
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-bottom: 0.375rem;
            padding-left: 0.125rem;
        }

        .message-assistant .message-sender { color: var(--gold); }
        .message-user .message-sender { color: var(--text-light); text-align: right; padding-right: 0.125rem; padding-left: 0; }

        .message-bubble {
            padding: 1rem 1.375rem;
            border-radius: 16px;
            font-size: 0.9375rem;
            line-height: 1.65;
            font-weight: 400;
        }

        .message-assistant .message-bubble {
            background: var(--white);
            color: var(--text-primary);
            border: 1px solid rgba(44, 74, 62, 0.06);
            border-bottom-left-radius: 4px;
        }

        .message-assistant .message-bubble strong { color: var(--green-dark); font-weight: 600; }
        .message-assistant .message-bubble a { color: var(--green); text-decoration: underline; text-underline-offset: 2px; }
        .message-assistant .message-bubble a:hover { color: var(--green-dark); }
        .message-assistant .message-bubble p { margin: 0 0 0.25rem; }
        .message-assistant .message-bubble p:last-child { margin-bottom: 0; }
        .message-assistant .message-bubble ul,
        .message-assistant .message-bubble ol { margin: 0.25rem 0 0.5rem 1.25rem; padding: 0; }
        .message-assistant .message-bubble li { margin-bottom: 0.25rem; }
        .message-assistant .message-bubble hr {
            border: none;
            border-top: 1px solid rgba(0,0,0,0.08);
            margin: 1rem 0;
        }
        .message-assistant .message-bubble strong {
            display: inline-block;
            margin-top: 0.25rem;
        }

        .message-user .message-bubble {
            background: var(--green);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        .typing-indicator { align-self: flex-start; animation: messageIn 0.4s var(--ease-out); }

        .typing-indicator .message-sender {
            font-size: 0.6875rem; font-weight: 500; letter-spacing: 0.18em;
            text-transform: uppercase; color: var(--gold); margin-bottom: 0.375rem; padding-left: 0.125rem;
        }

        .typing-dots {
            display: flex; gap: 0.375rem; padding: 1rem 1.375rem;
            background: var(--white); border: 1px solid rgba(44, 74, 62, 0.06);
            border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content;
        }

        .typing-dots span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-light); animation: typingPulse 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingPulse {
            0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-3px); }
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chat-input-area {
            padding: 1.25rem 2rem 1.5rem;
            border-top: 1px solid rgba(44, 74, 62, 0.08);
            background: var(--white);
            flex-shrink: 0;
        }

        .chat-input-form {
            display: flex;
            gap: 0.75rem;
            max-width: 680px;
            margin: 0 auto;
        }

        .chat-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border: 1.5px solid rgba(44, 74, 62, 0.12);
            border-radius: 100px;
            background: var(--cream);
            font-family: 'Inter', sans-serif;
            font-size: 0.9375rem;
            color: var(--text-primary);
            outline: none;
            transition: border-color 0.15s ease;
        }

        .chat-input::placeholder { color: var(--text-light); }
        .chat-input:focus { border-color: var(--green-light); }

        .chat-send {
            padding: 0.875rem 1.75rem;
            background: var(--green);
            color: var(--white);
            border: none;
            border-radius: 100px;
            font-family: 'Inter', sans-serif;
            font-size: 0.8125rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .chat-send:hover { background: var(--green-dark); }
        .chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-banner {
            background: #fef3f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 0.75rem 1.25rem;
            font-size: 0.875rem;
            text-align: center;
            display: none;
        }

        @media (max-width: 640px) {
            .chat-header { padding: 0.875rem 1.25rem; }
            .chat-header-label { display: none; }
            .chat-body { padding: 1.5rem 1rem; }
            .chat-input-area { padding: 1rem 1rem 1.25rem; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <header class="chat-header">
        <a href="/" class="chat-header-logo" style="text-decoration:none;">LiLo</a>
        <div class="chat-header-label">Concierge — Private Beta</div>
        <a href="/" class="chat-header-back">Back</a>
    </header>

    <div class="error-banner" id="error-banner"></div>

    <div class="chat-body" id="chat-body">
        <div class="message message-assistant">
            <div class="message-sender">LiLo</div>
            <div class="message-bubble">Welcome. Tell me what you're looking for — a retreat, an urban escape, a practitioner — and I'll find your match.</div>
        </div>
    </div>

    <div class="chat-input-area">
        <form class="chat-input-form" id="chat-form">
            <input type="text" class="chat-input" id="chat-input" placeholder="Tell LiLo what you're looking for..." autocomplete="off">
            <button type="submit" class="chat-send" id="chat-send">Send</button>
        </form>
    </div>

    <script>
        const MAX_MESSAGES = 10;
        const messages = [];
        let messageCount = 0;
        const chatBody = document.getElementById('chat-body');
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatSend = document.getElementById('chat-send');
        const errorBanner = document.getElementById('error-banner');

        chatInput.focus();

        // Configure marked for safe rendering with links opening in new tab
        const renderer = new marked.Renderer();
        renderer.link = function({ href, title, text }) {
            const titleAttr = title ? ` title="${title}"` : '';
            return `<a href="${href}"${titleAttr} target="_blank" rel="noopener noreferrer">${text}</a>`;
        };
        marked.setOptions({ renderer, breaks: true, gfm: true });

        function renderMarkdown(text) {
            const raw = marked.parse(text);
            return DOMPurify.sanitize(raw, {
                ADD_ATTR: ['target', 'rel'],
                ALLOWED_TAGS: ['p', 'br', 'strong', 'em', 'a', 'ul', 'ol', 'li', 'code', 'pre', 'hr']
            });
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = chatInput.value.trim();
            if (!text) return;

            messageCount++;

            if (messageCount > MAX_MESSAGES) {
                appendMessage('assistant', "Thanks for trying LiLo! You've reached the limit for this demo session. [Join the waitlist for full access](/#waitlist) \u2014 we'd love to have you.");
                chatInput.disabled = true;
                chatSend.disabled = true;
                return;
            }

            appendMessage('user', text);
            messages.push({ role: 'user', content: text });
            chatInput.value = '';
            chatSend.disabled = true;
            chatInput.disabled = true;
            errorBanner.style.display = 'none';

            const typing = showTyping();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages })
                });

                removeTyping(typing);

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.error || 'Something went wrong');
                }

                const data = await res.json();
                const reply = data.content[0].text;
                appendMessage('assistant', reply);
                messages.push({ role: 'assistant', content: reply });

                if (data._limit_reached) {
                    chatInput.disabled = true;
                    chatSend.disabled = true;
                    return;
                }
            } catch (err) {
                removeTyping(typing);
                errorBanner.textContent = err.message;
                errorBanner.style.display = 'block';
            }

            chatInput.disabled = false;
            chatSend.disabled = false;
            chatInput.focus();
        });

        function appendMessage(role, text) {
            const wrapper = document.createElement('div');
            wrapper.className = `message message-${role}`;

            const sender = document.createElement('div');
            sender.className = 'message-sender';
            sender.textContent = role === 'assistant' ? 'LiLo' : 'You';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            if (role === 'assistant') {
                bubble.innerHTML = renderMarkdown(text);
            } else {
                bubble.textContent = text;
            }

            wrapper.appendChild(sender);
            wrapper.appendChild(bubble);
            chatBody.appendChild(wrapper);
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function showTyping() {
            const el = document.createElement('div');
            el.className = 'typing-indicator';
            el.innerHTML = `
                <div class="message-sender">LiLo</div>
                <div class="typing-dots">
                    <span></span><span></span><span></span>
                </div>`;
            chatBody.appendChild(el);
            chatBody.scrollTop = chatBody.scrollHeight;
            return el;
        }

        function removeTyping(el) {
            if (el && el.parentNode) el.parentNode.removeChild(el);
        }
    </script>
</body>
</html>
